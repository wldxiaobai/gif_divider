name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install Pillow

      - name: Smoke test (CLI mode)
        run: |
          python --version
          python -c "from PIL import Image; print('Pillow OK:', Image.__version__)"
          # 生成一个最小 GIF
          python - << 'PY'
          from PIL import Image
          im1 = Image.new("RGBA", (16, 16), (255, 0, 0, 255))
          im2 = Image.new("RGBA", (16, 16), (0, 255, 0, 255))
          im1.save("test.gif", save_all=True, append_images=[im2], duration=100, loop=0)
          print("Created test.gif")
          PY
          # CLI 拆帧（保存 sheet）
          python gif_divider.py --input test.gif --save-mode single --output out.png
          test -f out.png