name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  run:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install Pillow pyinstaller

      - name: Smoke test (CLI mode)
        run: |
          python --version
          python -c "from PIL import Image; print('Pillow OK:', Image.__version__)"
          python - << 'PY'
          from PIL import Image
          im1 = Image.new("RGBA", (16, 16), (255, 0, 0, 255))
          im2 = Image.new("RGBA", (16, 16), (0, 255, 0, 255))
          im1.save("test.gif", save_all=True, append_images=[im2], duration=100, loop=0)
          print("Created test.gif")
          PY
          python gif_divider.py --input test.gif --save-mode single --output out.png
          if (!(Test-Path out.png)) { throw "out.png not found" }

      - name: Build exe
        run: |
          python -m PyInstaller --onefile --windowed --name "GIF拆帧工具" gif_divider.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
          if-no-files-found: error